# =============================================================================
# pre-commit 設定（このリポジトリ自身に効かせる秘密混入ガード）
#
# 有効化: リポジトリルートで `pre-commit install`
#         （bootstrap.sh でも自動実行される）
#
# 役割: commit 時に gitleaks が走り、APIキー・トークン・社内情報等の
#       混入を検出したら commit を拒否する。
#       Claude Code 経由の編集で誤って秘密をコミットする事故を水際で防ぐ。
# =============================================================================
repos:
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks
