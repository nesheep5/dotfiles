set -s set-clipboard on

# prefixキーをC-qに変更
set -g prefix C-q
set-option -g history-limit 50000

# C-bのキーバインドを解除
unbind C-b

# C-qを2回押すとアプリケーションにわたす
bind C-q send-prefix

# vim escキータイムラグを解消 https://wonderwall.hatenablog.com/entry/2016/03/13/143024
set -g escape-time 0

# 設定ファイルをリロードする
bind r source-file ~/.config/tmux/tmux.conf \; display-message "Config reloaded!!"

# vim-tmux-navigator 連携: prefix 無しの M-h/j/k/l（Alt+hjkl）で
# neovim ウィンドウと tmux ペインをシームレスに移動する。
# C-h はターミナルの Backspace と同コード(0x08)のため使わず、Alt 系に統一している。
# neovim にフォーカスがある時はキーを neovim へ送り、そうでなければ tmux ペインを動かす。
# neovim 側にも vim-tmux-navigator プラグインが必要（neovim-config リポジトリ）。
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|l?n?vim?x?|fzf)(diff)?$'"
bind-key -n 'M-h' if-shell "$is_vim" 'send-keys M-h'  'select-pane -L'
bind-key -n 'M-j' if-shell "$is_vim" 'send-keys M-j'  'select-pane -D'
bind-key -n 'M-k' if-shell "$is_vim" 'send-keys M-k'  'select-pane -U'
bind-key -n 'M-l' if-shell "$is_vim" 'send-keys M-l'  'select-pane -R'
# copy-mode 中でも M-h/j/k/l でペイン移動できるようにする
bind-key -T copy-mode-vi 'M-h' select-pane -L
bind-key -T copy-mode-vi 'M-j' select-pane -D
bind-key -T copy-mode-vi 'M-k' select-pane -U
bind-key -T copy-mode-vi 'M-l' select-pane -R

# 保険として prefix → h/j/k/l のペイン移動も残す
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# prefix 無しの Alt+数字でウィンドウ番号へ直接ジャンプ、Alt+[ ] で前後移動
bind-key -n M-1 select-window -t 1
bind-key -n M-2 select-window -t 2
bind-key -n M-3 select-window -t 3
bind-key -n M-4 select-window -t 4
bind-key -n M-5 select-window -t 5
bind-key -n M-6 select-window -t 6
bind-key -n M-7 select-window -t 7
bind-key -n M-8 select-window -t 8
bind-key -n M-9 select-window -t 9
bind-key -n 'M-[' previous-window
bind-key -n 'M-]' next-window

# 全画面表示
bind f  resize-pane -Z

# vimのキーバインドでペインをリサイズする
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# window
bind c new-window -c '#{pane_current_path}'
bind | split-window -h -c '#{pane_current_path}'
bind - split-window -v  -c '#{pane_current_path}'

# 番号基準値を変更
set-option -g base-index 1

# ウィンドウを閉じたら番号を自動で詰める
set-option -g renumber-windows on

# マウス操作を有効にする
# tmux標準のホイール処理に任せる:
#   - 代替画面アプリ(Claude Code, vim, less等)ではホイールイベントをアプリに転送
#   - 通常画面ではコピーモードで履歴をスクロール
setw -g mouse on

# ==== TokyoNight Night ステータスバー ====
# この端末(EC2)で使っていた TokyoNight Night の見た目を踏襲する。
# 旧構成は nvim プラグインの tmux テーマ(tokyonight_night.tmux)を source していたが、
# tmux 単体で自己完結させるため、必要な配色・書式をここに直書きしている。
# グリフ(Nerd Font)を含む status-left / window-status 系は当時の表示を壊さないよう、
# 配色を TokyoNight Night の直値のまま残している。
%hidden TN_BG=#16161e
%hidden TN_SURFACE=#292e42
%hidden TN_BORDER=#3b4261
%hidden TN_FG=#c0caf5
%hidden TN_DIM=#7a82a8
%hidden TN_MUTED=#565f89
%hidden TN_BLUE=#7aa2f7

# ステータスバーを上部に配置
set -g status-position top
set -g status-interval 5
set -g status-justify left

# バー全体の地色
set -g status-style "fg=$TN_BLUE,bg=$TN_BG"

# 左側: セッション名（Nerd Font アイコン付きのパワーライン）
set -g status-left "#[fg=#15161e,bg=#7aa2f7,bold]  #S #[fg=#7aa2f7,bg=#16161e,nobold,nounderscore,noitalics]"
set -g status-left-length 40

# 右側: システムリソース（CPU / MEM / DISK）。scripts/tmux-sysstat.sh が powerline 形式で
# 出力する（Mac/Linux 両対応・3段階色・Nerd Font アイコン）。
set -g status-right "#(bash ~/.config/tmux/scripts/tmux-sysstat.sh)"
set -g status-right-length 120

# 非アクティブなウィンドウタブ（#I アイコン #W、bell=黄/activity=緑/zoom=橙 のフラグ表示）
setw -g window-status-format "#[fg=#16161e,bg=#16161e,nobold,nounderscore,noitalics]#[default] #I  #W#{?window_bell_flag, #[fg=#e0af68],}#{?window_activity_flag, #[fg=#9ece6a],}#{?window_zoomed_flag, #[fg=#ff9e64],} #[fg=#16161e,bg=#16161e,nobold,nounderscore,noitalics]"
set -g window-status-separator ""

# アクティブなウィンドウタブ（青背景のパワーライン）
setw -g window-status-current-format "#[fg=#16161e,bg=#3b4261,nobold,nounderscore,noitalics]#[fg=#7aa2f7,bg=#3b4261,bold] #I  #W#{?window_bell_flag, #[fg=#e0af68],}#{?window_activity_flag, #[fg=#9ece6a],}#{?window_zoomed_flag, #[fg=#ff9e64],} #[fg=#3b4261,bg=#16161e,nobold,nounderscore,noitalics]"

# ペイン枠線
# 非アクティブは $TN_BORDER(#3b4261) で背景に溶けない程度に視認でき、アクティブは青で強調。
set -g pane-border-style "fg=$TN_BORDER"
set -g pane-active-border-style "fg=$TN_BLUE"

# ペイン上部にタイトルを表示（Claude Code の agent 識別等に有用）。
# アクティブは青太字、非アクティブは淡色。#{pane_title} は実行中プログラムが設定する。
# #{?...} 内のリテラルカンマは #, でエスケープする。
set -g pane-border-status top
set -g pane-border-format "#{?pane_active,#[fg=$TN_BLUE#,bold],#[fg=$TN_MUTED]} #{pane_title} #[default]"

# アクティブペインの強調（文字色のコントラストで区別）
# 判読性(ペイン内: 文字 vs 背景)と区別性(ペイン間: アクティブ vs 非アクティブ)を分けて設計する。
# - 区別性: アクティブ $TN_FG (背景比 10.6:1) と非アクティブ $TN_DIM (同 4.55:1) で明確に差をつける。
# - 判読性: 非アクティブも WCAG 本文基準 4.5:1 を守る限界 $TN_DIM(#7a82a8) に留め、内容は読める。
#   $TN_MUTED(コメント色, 2.8:1)まで落とすと非アクティブが読めずアクセシビリティを損なうため使わない。
# bg を指定しないことで ghostty の background-opacity / blur(透過) を全ペインで完全に維持する。
set -g window-style        "fg=$TN_DIM"
set -g window-active-style "fg=$TN_FG"

# メッセージ/コマンドラインの色
set -g message-style "bg=$TN_SURFACE,fg=$TN_FG"

## viのキーバインドを使用
setw -g mode-keys vi

# 幅を等しくする
bind ^h select-layout even-horizontal

# 高さを等しくする
bind ^v select-layout even-vertical

# toggle synchronize-panes
bind e setw synchronize-panes\; display-message "synchronize-panes #{?pane_synchronized,on,off}"

## ウィンドウの活動/ベルを監視し、タブのフラグ表示（window-status の #{?...}）で知らせる。
## 旧構成に合わせ visual-activity は off（画面フラッシュではなくタブのフラグで通知する）。
setw -g monitor-activity on
setw -g monitor-bell on
set -g activity-action other
set -g bell-action other
setw -g window-status-activity-style "none"
set -g visual-activity off

set -g default-terminal "tmux-256color"
# tell Tmux that outside terminal supports true color
set -ga terminal-overrides ",xterm-ghostty:RGB,xterm-256color*:RGB"

# Claude Code: Shift+Enter での改行と、通知/プログレスバーの透過を有効化
# https://code.claude.com/docs/ja/terminal-config#configure-tmux
set -g allow-passthrough on
set -s extended-keys on
set -as terminal-features 'xterm*:extkeys'

# ==== tmux プラグイン（tpm 管理） ====
# プラグインの真実の源はこの宣言。plugins/ 配下の実体はコミットしない（bootstrap が clone）。
# tpm 本体・各プラグインは ~/.config/tmux/plugins/ に clone される。
# CPU/MEM/DISK の表示は tmux-cpu ではなく scripts/tmux-sysstat.sh が担う（status-right）。
set -g @plugin 'tmux-plugins/tpm'

# tpm 初期化（このリポジトリで他の設定をすべて記述した後に置く必要がある）。
# tpm 未導入環境でも起動エラーにならないよう、存在する時のみ run する。
if-shell '[ -f ~/.config/tmux/plugins/tpm/tpm ]' \
  "run '~/.config/tmux/plugins/tpm/tpm'"

# 環境固有設定を読み込む（存在しなければ -q で静かにスキップ）
# 仕事固有/環境依存の設定は ~/.config/tmux/tmux.local.conf に置く
source-file -q ~/.config/tmux/tmux.local.conf
